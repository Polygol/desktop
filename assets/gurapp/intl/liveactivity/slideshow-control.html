<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="./desktop/assets/gurapp/api/gurasuraisu-api.js"></script>
    <style>
        body {
            margin: 0;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: space-between;
            height: 100vh; width: 100vw; box-sizing: border-box;
            overflow: hidden;
            user-select: none;
        }
        .info {
            display: flex; flex-direction: column;
        }
        .label { font-size: 12px; font-weight: 500; }
        .counter {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Inter Numeric', 'Inter', sans-serif;
            font-variation-settings: "RDNS" 1;
            font-variant: tabular-nums;
        }
        .controls {
            display: flex; gap: 6px; align-items: center;
        }
        button {
            background: transparent;
            border: none;
            color: var(--text-color);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .play-btn {
            background: var(--accent);
            border: 1px solid var(--glass-border);
            box-shadow: var(--sun-shadow);
            color: var(--background-color);
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="info">
        <span class="label">Slideshow</span>
        <span class="counter" id="counter">-- / --</span>
    </div>
    <div class="controls">
        <button onclick="send('cycleSpeed')" id="speed-btn" style="font-weight: 800; font-family: 'Open Runde';">--</button>
        <button onclick="send('toggleShuffle')" id="shuffle-btn"><span class="material-symbols-rounded" style="font-size: 18px;">shuffle</span></button>
        <button onclick="send('prev')"><span class="material-symbols-rounded">chevron_backward</span></button>
        <button onclick="send('next')"><span class="material-symbols-rounded">chevron_forward</span></button>
        <button class="play-btn" onclick="send('toggle')">
            <span id="play-icon" class="material-symbols-rounded">stop</span>
        </button>
    </div>
    <script>
        function send(action) {
            window.parent.postMessage({ type: 'slideshow-control', action }, '*');
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'live-activity-update') {
                document.getElementById('counter').textContent = `${e.data.current} / ${e.data.total}`;
                document.getElementById('play-icon').textContent = e.data.paused ? 'play_arrow' : 'stop';
                document.getElementById('speed-btn').textContent = e.data.speedLabel || '--';
                
                const sBtn = document.getElementById('shuffle-btn');
                sBtn.style.background = e.data.shuffle ? 'var(--search-background)' : 'transparent';
                sBtn.style.boxShadow = e.data.shuffle ? 'var(--sun-shadow)' : 'none';
            }
        });
    </script>
</body>
</html>
